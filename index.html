<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Engine</title>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <link rel="stylesheet"
    href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <script
    src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ========================== -->
<!-- MENU SCREEN -->
<!-- ========================== -->

<div id="menuScreen" class="screen">

    <div class="menu-box">

        <h1>&#9823; Chess</h1>

        <div class="menu-step" id="modeStep">

            <p class="menu-label">Choose Mode</p>

            <button class="menu-btn" data-mode="1v1">1 vs 1</button>
            <button class="menu-btn" data-mode="ai">vs AI</button>

        </div>

        <div class="menu-step hidden" id="difficultyStep">

            <p class="menu-label">Select Difficulty</p>

            <button class="menu-btn" data-difficulty="easy">Easy</button>
            <button class="menu-btn" data-difficulty="medium">Medium</button>
            <button class="menu-btn" data-difficulty="hard">Hard</button>

            <button class="menu-btn back-btn" id="backToModeBtn">&larr; Back</button>

        </div>

        <div class="menu-step hidden" id="startStep">

            <p class="menu-label" id="selectionSummary"></p>

            <button class="menu-btn start-btn" id="startGameBtn">Start Game</button>
            <button class="menu-btn back-btn" id="backToModeBtn2">&larr; Back</button>

        </div>

    </div>

</div>

<!-- ========================== -->
<!-- GAME SCREEN -->
<!-- ========================== -->

<div id="gameScreen" class="screen hidden">

    <div class="game-wrapper">

        <div id="myBoard"></div>

        <div id="sidePanel">

            <h2>Game</h2>

            <p id="modeInfo"></p>
            <p id="turnInfo"></p>

            <div class="side-buttons">
                <button id="undoBtn">&#8630; Undo</button>
                <button id="toggleHistoryBtn">Show History</button>
                <button id="newGameBtn">New Game</button>
                <button id="exitBtn">Exit to Menu</button>
            </div>

            <div id="historyPanel" class="hidden">
                <div id="moveHistory"></div>
            </div>

        </div>

    </div>

</div>

<!-- ========================== -->
<!-- PROMOTION MODAL -->
<!-- ========================== -->

<div id="promotionModal" class="modal-overlay hidden">

    <div class="modal-box">

        <h3>Promote Pawn</h3>

        <div class="promo-options">
            <button class="promo-btn" data-piece="q">Queen</button>
            <button class="promo-btn" data-piece="r">Rook</button>
            <button class="promo-btn" data-piece="b">Bishop</button>
            <button class="promo-btn" data-piece="n">Knight</button>
        </div>

    </div>

</div>

<!-- ========================== -->
<!-- GAME OVER MODAL -->
<!-- ========================== -->

<div id="gameOverModal" class="modal-overlay hidden">

    <div class="modal-box">

        <h3 id="gameOverTitle">Checkmate!</h3>
        <p id="gameOverMsg"></p>

        <div class="gameover-buttons">
            <button id="newGameModalBtn">New Game</button>
            <button id="exitModalBtn">Exit</button>
        </div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
